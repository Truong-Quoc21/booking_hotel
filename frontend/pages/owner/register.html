<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — StayNest</title>
  <link rel="stylesheet" href="../../css/pages/account.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg"></div>

  <div class="card">
    <h1>Register</h1>
    <p class="sub">Create a new account</p>

    <form id="registerForm" novalidate>

      <!-- Full Name -->
      <div class="field">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </span>
        <input type="text" id="fullname" placeholder="Full Name" autocomplete="name" required />
      </div>

      <!-- Email -->
      <div class="field">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
        </span>
        <input type="email" id="email" placeholder="Email Address" autocomplete="email" required />
      </div>

      <!-- Password -->
      <div class="field">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <input type="password" id="password" placeholder="Password" autocomplete="new-password" required />
        <button type="button" class="eye" onclick="togglePwd('password', this)" aria-label="Toggle password">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><path d="M9 16l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <input type="password" id="confirm" placeholder="Confirm Password" autocomplete="new-password" required />
        <button type="button" class="eye" onclick="togglePwd('confirm', this)" aria-label="Toggle confirm password">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <p class="signin-row">
        Already have an account? <a href="login.html">SIGN IN HERE</a>
      </p>

      <button type="submit" class="btn-submit">Create Account</button>

    </form>
  </div>

  <!-- Sparkle decoration -->
  <div class="sparkle">
    <svg viewBox="0 0 24 24"><path d="M12 2l2.09 6.26L21 9.27l-5 4.73 1.18 6.87L12 17.77l-5.18 3.1L8 13.9 3 9.27l6.91-1.01z"/></svg>
  </div>

  <script>
    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.style.color = isText ? 'rgba(240,246,255,0.4)' : '#0eb8c4';
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name    = document.getElementById('fullname').value.trim();
      const email   = document.getElementById('email').value.trim();
      const pwd     = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!name || !email || !pwd || !confirm) {
        alert('Hãy điền đầy đủ thông tin');
        return;
      }
      if (pwd !== confirm) {
        alert('Mật khẩu không khớp');
        return;
      }
      alert('Đăng ký thành công!');
    });
  </script>

</body>
</html>
